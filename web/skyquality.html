<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sky Quality &amp; Meteors — astronomy.garden</title>
<style>
  :root{
    --page:#f9f9f7;--surface:#fcfcfb;--tp:#0b0b0b;--ts:#52514e;--muted:#898781;
    --grid:#e1e0d9;--axis:#c3c2b7;--border:rgba(11,11,11,.10);--sqm:#2a78d6;--met:#eb6834;
  }
  @media (prefers-color-scheme:dark){:root{
    --page:#0d0d0d;--surface:#1a1a19;--tp:#fff;--ts:#c3c2b7;--muted:#898781;
    --grid:#2c2c2a;--axis:#383835;--border:rgba(255,255,255,.10);--sqm:#3987e5;--met:#d95926;}}
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--page);
    color:var(--tp);margin:0;padding:28px 20px 56px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:1.5rem;font-weight:650;margin:0 0 4px;letter-spacing:-.01em}
  .lead{margin:0 0 22px;color:var(--ts);font-size:.9rem}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  @media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr)}}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px}
  .tile .k{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .tile .v{font-size:1.7rem;font-weight:650;margin-top:5px;line-height:1}
  .tile .u{font-size:.78rem;color:var(--ts);margin-top:4px}
  .v.sqm{color:var(--sqm)}.v.met{color:var(--met)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px 12px;margin-bottom:20px}
  .card h2{font-size:.98rem;font-weight:600;margin:0 0 2px}
  .card .sub{font-size:.8rem;color:var(--muted);margin:0 0 10px}
  .scroll{overflow-x:auto}svg{display:block;width:100%;height:auto}
  .tick,.ytick{fill:var(--muted);font-size:11px}.axl{fill:var(--ts);font-size:11px}
  .vl{fill:var(--ts);font-size:11px;font-weight:600}
  .foot{color:var(--muted);font-size:.76rem;text-align:center;margin-top:8px}
  .empty{color:var(--muted);font-size:.85rem;padding:26px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sky Quality &amp; Meteors</h1>
  <p class="lead">Live from the all-sky camera at astronomy.garden</p>
  <div class="tiles" id="tiles"></div>
  <div class="card">
    <h2>Sky brightness</h2><p class="sub">SQM in mag/arcsec² · higher = darker sky</p>
    <div class="scroll"><div id="sqm"></div></div>
  </div>
  <div class="card">
    <h2>Meteors per night</h2><p class="sub">Confirmed meteors (satellites &amp; aircraft excluded)</p>
    <div class="scroll"><div id="met"></div></div>
  </div>
  <p class="foot" id="foot">Loading…</p>
</div>
<script>
const $=id=>document.getElementById(id);
Promise.all([
  fetch('./skyquality.json').then(r=>r.ok?r.json():[]).catch(()=>[]),
  fetch('./meteors/meteors.json').then(r=>r.ok?r.json():[]).catch(()=>[])
]).then(([sqmRaw,metRaw])=>render(sqmRaw||[],metRaw||[]));

function render(sqmRaw,metRaw){
  // ---- SQM: last night (points from the most recent local-midnight window) ----
  const pts=sqmRaw.map(d=>{const dt=new Date(d.t*1000);
    let mins=dt.getHours()*60+dt.getMinutes(); if(dt.getHours()<12) mins+=1440; mins-=1260;
    return {min:mins,mag:d.sqm,label:String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')};});
  const mags=pts.map(p=>p.mag);
  const darkest=mags.length?Math.max(...mags):null;
  const median=mags.length?[...mags].sort((a,b)=>a-b)[Math.floor(mags.length/2)]:null;

  // ---- meteors per night ----
  const byNight={};
  metRaw.forEach(m=>{const d=(m.time||'').slice(0,8);if(d)byNight[d]=(byNight[d]||0)+1;});
  const nights=Object.keys(byNight).sort().slice(-14);
  const met=nights.map(d=>({d:d.slice(6),n:byNight[d]}));
  while(met.length<14) met.unshift({d:'',n:0});
  const tonight=met.length?met[met.length-1].n:0, total=metRaw.length;

  $('tiles').innerHTML=[
    ['Darkest last night',darkest?darkest.toFixed(2):'—','mag/arcsec²','sqm'],
    ['Median last night',median?median.toFixed(2):'—','mag/arcsec²','sqm'],
    ['Meteors last night',tonight,'confirmed','met'],
    ['Meteors — total',total,'confirmed','met'],
  ].map(([k,v,u,c])=>`<div class="tile"><div class="k">${k}</div><div class="v ${c}">${v}</div><div class="u">${u}</div></div>`).join('');

  drawLine('sqm',pts);
  drawBars('met',met);
  $('foot').textContent=`SQM points: ${pts.length} · meteors logged: ${total} · updates each night`;
}

function drawLine(id,data){
  const host=$(id);
  if(!data.length){host.innerHTML='<div class="empty">No sky-quality data yet — the module writes it each night.</div>';return;}
  const W=900,H=300,P={l:44,r:16,t:16,b:34},iw=W-P.l-P.r,ih=H-P.t-P.b;
  const xs=data.map(d=>d.min),minX=Math.min(...xs),maxX=Math.max(...xs);
  const vs=data.map(d=>d.mag);let yMin=Math.floor(Math.min(...vs)-0.5),yMax=Math.ceil(Math.max(...vs)+0.5);
  if(yMax-yMin<3)yMax=yMin+3;
  const X=m=>P.l+(m-minX)/((maxX-minX)||1)*iw,Y=v=>P.t+(yMax-v)/(yMax-yMin)*ih;
  let grid='',yl='';const step=(yMax-yMin)>8?2:1;
  for(let v=yMin;v<=yMax;v+=step){const y=Y(v);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--grid)"/>`;
    yl+=`<text class="ytick" x="${P.l-8}" y="${y+3.5}" text-anchor="end">${v}</text>`;}
  let xl='';data.forEach((d,i)=>{if(i%Math.ceil(data.length/8)===0)xl+=`<text class="tick" x="${X(d.min)}" y="${H-P.b+18}" text-anchor="middle">${d.label}</text>`;});
  const line=data.map((d,i)=>`${i?'L':'M'}${X(d.min).toFixed(1)},${Y(d.mag).toFixed(1)}`).join(' ');
  const area=`M${X(data[0].min)},${Y(yMin)} `+data.map(d=>`L${X(d.min).toFixed(1)},${Y(d.mag).toFixed(1)}`).join(' ')+` L${X(data[data.length-1].min)},${Y(yMin)} Z`;
  const pk=data.reduce((a,b)=>b.mag>a.mag?b:a);
  host.innerHTML=`<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="var(--sqm)" stop-opacity=".22"/><stop offset="1" stop-color="var(--sqm)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<line x1="${P.l}" y1="${P.t}" x2="${P.l}" y2="${H-P.b}" stroke="var(--axis)"/>
    <line x1="${P.l}" y1="${H-P.b}" x2="${W-P.r}" y2="${H-P.b}" stroke="var(--axis)"/>${yl}${xl}
    <text class="axl" x="${P.l}" y="${P.t-4}">mag/arcsec²</text>
    <path d="${area}" fill="url(#g)"/><path d="${line}" fill="none" stroke="var(--sqm)" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${X(pk.min)}" cy="${Y(pk.mag)}" r="3.5" fill="var(--sqm)" stroke="var(--surface)" stroke-width="2"/>
    <text class="vl" x="${X(pk.min)}" y="${Y(pk.mag)-9}" text-anchor="middle">${pk.mag.toFixed(2)}</text></svg>`;
}

function drawBars(id,data){
  const host=$(id);const has=data.some(d=>d.n>0);
  const W=900,H=240,P={l:34,r:16,t:20,b:30},iw=W-P.l-P.r,ih=H-P.t-P.b;
  const maxN=Math.max(4,...data.map(d=>d.n)),bw=iw/data.length,pad=bw*0.28;
  const Y=v=>P.t+(1-v/maxN)*ih;let grid='',yl='';
  for(let v=0;v<=maxN;v+=Math.ceil(maxN/4)){const y=Y(v);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--grid)"/>`;
    yl+=`<text class="ytick" x="${P.l-8}" y="${y+3.5}" text-anchor="end">${v}</text>`;}
  let bars='',xl='';data.forEach((d,i)=>{const x=P.l+i*bw+pad/2,w=bw-pad,y=Y(d.n),r=Math.min(4,w/2);
    if(d.n>0){bars+=`<path d="M${x},${H-P.b} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${H-P.b} Z" fill="var(--met)"/>`;
      bars+=`<text class="vl" x="${x+w/2}" y="${y-6}" text-anchor="middle">${d.n}</text>`;}
    else bars+=`<circle cx="${x+w/2}" cy="${H-P.b}" r="1.5" fill="var(--muted)"/>`;
    xl+=`<text class="tick" x="${x+w/2}" y="${H-P.b+18}" text-anchor="middle">${d.d}</text>`;});
  host.innerHTML=`<svg viewBox="0 0 ${W} ${H}">${grid}<line x1="${P.l}" y1="${H-P.b}" x2="${W-P.r}" y2="${H-P.b}" stroke="var(--axis)"/>${yl}${xl}${bars}</svg>`
    +(has?'':'<div class="empty">No meteors confirmed yet — watching each clear night.</div>');
}
</script>
</body>
</html>
